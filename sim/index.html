<!doctype html>
<html lang="en">
<head>

	<!-- Meta -->
	<title>Emoji Simulator</title>
	<meta charset="utf-8">
	<meta content="text/html;charset=utf-8" http-equiv="Content-Type">
	<meta content="utf-8" http-equiv="encoding">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="Local replica of the relaunched Emoji Simulator editor.">
	<meta itemprop="name" content="Emoji Simulator">
	<meta itemprop="description" content="Local replica of the relaunched Emoji Simulator editor.">
	<meta itemprop="image" content="./thumb.png">
	<meta property="og:title" content="Emoji Simulator">
	<meta property="og:type" content="website">
	<meta property="og:url" content="./">
	<meta property="og:image" content="./thumb.png">
	<meta property="og:description" content="Local replica of the relaunched Emoji Simulator editor.">

	<!-- Styles -->
	<link rel="stylesheet" type="text/css" href="styles/model.css">
	<link rel="stylesheet" type="text/css" href="styles/perfect-scrollbar.min.css">
	<link rel="stylesheet" href="../shared/public-footer.css">

</head>
<body data-reference-url="https://ncase.me/sim/" data-reference-text="Emoji Simulator">

	<!-- The grid. Inline CSS so grid can change, shuddup. -->
	<style id="ui_style"></style>
	<style id="grid_style"></style>
	<div id="grid_container">
		<div id="grid_bg"></div>
		<div id="grid"></div>
	</div>

	<!-- Play/Pause/Reset/Step/Draw controls -->
	<div id="play_container">
		<div id="play_controls">
			
			<!-- New Board -->
			<div class="control_button" id="play_reset">reset</div>
			<div class="control_divider"></div>

			<!-- Playback -->
			<div class="control_button" id="play_pause">pause</div>
			<div class="control_speed">
				<input id="control_fps" type="range" min="1" max="60" step="1">
				<br>
				<div style="float:left;">slow</div>
				<div style="float:right;">fast</div>
			</div>
			<div class="control_button" id="play_step">step</div>
			<div class="control_divider"></div>

			<!-- Drawing Shtuff -->
			<div class="control_button" id="play_draw">draw <div></div></div>

		</div>
	</div>

	<!-- The big honkin' editor -->
	<div id="editor_container">
		<div id="editor"></div>
	</div>

</body>
</html>
