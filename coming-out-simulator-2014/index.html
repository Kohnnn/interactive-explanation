      <div id="background"></div>
      <div id="dialogue"></div>

            Coming Out Simulator 2014
          </span>
          <br>
          <span style="color:#555; font-size:16px">

          <br><br>
          <span style="font-size:18px">

          </span>
        </div>
      </div>
    </div>
