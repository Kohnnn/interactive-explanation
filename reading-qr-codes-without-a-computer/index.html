      <link rel="stylesheet" crossorigin href="./assets/index-s1eyThQf.css">
      <script defer src="../shared/public-footer.js"></script>
      <script>
        document.addEventListener("DOMContentLoaded", function () {
          const app = document.getElementById("app");
          if (!app) {
            return;
          }

          function prunePromoSurfaces() {
            for (const node of Array.from(app.children)) {
              if (node.textContent?.trim() === "Made in love by Piko and blinry for 37C3") {
                node.remove();
              }
            }

            for (const heading of Array.from(app.querySelectorAll("h2"))) {
              if (heading.textContent?.trim() !== "Found a bug? Feature request?") {
                continue;
              }
              const next = heading.nextElementSibling;
              heading.remove();
              if (next?.tagName === "P") {
                next.remove();
              }
            }
          }

          prunePromoSurfaces();
          new MutationObserver(prunePromoSurfaces).observe(app, { childList: true, subtree: true });
        });
      </script>
    </head>
    <body data-reference-url="https://qr.blinry.org/" data-reference-text="Reading QR codes without a computer!" data-footer-label="Original page">
        <div id="app"></div>
    </body>
